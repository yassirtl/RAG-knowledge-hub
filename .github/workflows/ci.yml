name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff linter
        run: pip install ruff && ruff check app/ tests/

      - name: Run Mypy type checker
        run: pip install mypy && mypy app/

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-key
          CHROMA_PERSIST_DIR: /tmp/chroma_test
          UPLOAD_DIR: /tmp/uploads_test
        run: pytest tests/ -v --tb=short

  frontend-lint-and-build:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-build:
    name: Docker – Build images
    runs-on: ubuntu-latest
    needs: [backend-lint-and-test, frontend-lint-and-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t knowledge-hub-api:ci ./backend

      - name: Build frontend image
        run: docker build -t knowledge-hub-ui:ci ./frontend
